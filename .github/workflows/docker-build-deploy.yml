name: Build and Deploy (Docker & K8s)

on:
  push:
    branches: [ main ]
    paths:
      - 'web/**'
      - 'k8s/**'
      - 'Dockerfile'

jobs:
  build-and-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: jeongseungmin/ddabong_jeong:latest

  deploy-to-k8s:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Get Server IP from Terraform
      id: terraform_output
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
        TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
        TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        TF_VAR_ssh_pub_key: ${{ secrets.SSH_PUB_KEY }}
      run: |
        cd terraform
        terraform init
        echo "server_ip=$(terraform output -raw server_ip)" >> $GITHUB_OUTPUT

    - name: Set up SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ steps.terraform_output.outputs.server_ip }} >> ~/.ssh/known_hosts

    - name: Apply Kubernetes Manifests via SSH
      run: |
        scp -i ~/.ssh/id_rsa k8s/manifests.yaml ubuntu@${{ steps.terraform_output.outputs.server_ip }}:~/manifests.yaml
        ssh -i ~/.ssh/id_rsa ubuntu@${{ steps.terraform_output.outputs.server_ip }} "kubectl apply -f ~/manifests.yaml"
