name: Deployment (Ansible)

on:
  push:
    branches: [ main ]
    paths:
      - 'ansible/**'
  workflow_run:
    workflows: ["Infrastructure (Terraform)"]
    types: [completed]
    branches: [main]

jobs:
  ansible:
    name: Ansible Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Get Server IP from Terraform
      id: terraform_output
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
        TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
        TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        TF_VAR_ssh_pub_key: ${{ secrets.SSH_PUB_KEY }}
      run: |
        cd terraform
        terraform init
        echo "server_ip=$(terraform output -raw server_ip)" >> $GITHUB_OUTPUT

    - name: Set up SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ steps.terraform_output.outputs.server_ip }} >> ~/.ssh/known_hosts

    - name: Run Ansible Playbook
      run: |
        ansible-playbook -i "${{ steps.terraform_output.outputs.server_ip }}," ansible/playbook.yml \
          -u ubuntu \
          --private-key ~/.ssh/id_rsa
