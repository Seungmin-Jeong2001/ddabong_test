name: Infrastructure and Deployment (Terraform, Ansible, K8s)

on:
  workflow_dispatch: # 수동 실행 버튼으로 동작

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    env:
      GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
      TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_ssh_pub_key: ${{ secrets.SSH_PUB_KEY }}
      TF_VAR_ssh_user: "ubuntu" # SSH 접속 계정 명시
    outputs:
      server_ip: ${{ steps.terraform_output.outputs.server_ip }}
      tunnel_token: ${{ steps.terraform_output.outputs.tunnel_token }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init
      working-directory: terraform

    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: terraform

    - name: Get Terraform Outputs
      id: terraform_output
      run: |
        cd terraform
        echo "server_ip=$(terraform output -raw server_ip)" >> $GITHUB_OUTPUT
        echo "tunnel_token=$(terraform output -raw tunnel_token)" >> $GITHUB_OUTPUT

  ansible-setup:
    name: Ansible Setup k3s & Monitoring
    needs: terraform
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        # 서버 준비될 때까지 기다리며 스캔
        ssh-keyscan -H ${{ needs.terraform.outputs.server_ip }} >> ~/.ssh/known_hosts

    - name: Run Ansible Playbook
      run: |
        # [해결] --extra-vars 에 discord_webhook_url을 명시적으로 추가하여 Ansible 에러 해결
        ansible-playbook -i "${{ needs.terraform.outputs.server_ip }}," ansible/playbook.yml \
          -u ubuntu \
          --private-key ~/.ssh/id_rsa \
          --extra-vars "tunnel_token=${{ needs.terraform.outputs.tunnel_token }} discord_webhook_url=${{ secrets.DISCORD_WEBHOOK_URL }}"

  # [Docker 빌드 단계는 요청대로 제거되었습니다]

  k8s-deploy:
    name: Final Rollout
    needs: [terraform, ansible-setup]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ needs.terraform.outputs.server_ip }} >> ~/.ssh/known_hosts

    - name: App Rollout Restart
      run: |
        # 이미 Ansible의 k8s_deploy 역할에서 모든 manifests가 적용되었으므로, 
        # 여기서는 최신 이미지를 불러오기 위한 재시작 명령만 수행합니다.
        ssh -i ~/.ssh/id_rsa ubuntu@${{ needs.terraform.outputs.server_ip }} \
          "kubectl rollout restart deployment/cat-web-deployment"