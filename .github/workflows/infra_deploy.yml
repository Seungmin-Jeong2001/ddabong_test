name: Infrastructure and Deployment (Terraform, Ansible, K8s)

on:
  workflow_dispatch: # 수동 실행

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    env:
      GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
      TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_ssh_pub_key: ${{ secrets.SSH_PUB_KEY }}
    outputs:
      server_ip: ${{ steps.terraform_output.outputs.server_ip }}
      tunnel_token: ${{ steps.terraform_output.outputs.tunnel_token }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init
      working-directory: terraform

    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: terraform

    - name: Get Terraform Outputs
      id: terraform_output
      run: |
        cd terraform
        echo "server_ip=$(terraform output -raw server_ip)" >> $GITHUB_OUTPUT
        echo "tunnel_token=$(terraform output -raw tunnel_token)" >> $GITHUB_OUTPUT

  ansible-setup:
    name: Ansible Setup k3s, Tunnel & K8s Deploy
    needs: terraform
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ needs.terraform.outputs.server_ip }} >> ~/.ssh/known_hosts

    - name: Run Ansible Playbook
      run: |
        ansible-playbook -i "${{ needs.terraform.outputs.server_ip }}," ansible/playbook.yml \
          -u ubuntu \
          --private-key ~/.ssh/id_rsa \
          --extra-vars "tunnel_token=${{ needs.terraform.outputs.tunnel_token }} discord_webhook_url=${{ secrets.DISCORD_WEBHOOK_URL }}"
      # [수정] discord_webhook_url을 extra-vars로 추가하여 Ansible 에러 해결

  k8s-deploy:
    name: Final App Rollout
    needs: [terraform, ansible-setup] # docker-build-push 제거됨
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ needs.terraform.outputs.server_ip }} >> ~/.ssh/known_hosts

    - name: Apply Kubernetes Manifests via SSH
      run: |
        # 최신 배포를 위해 manifests 전송 및 적용
        scp -i ~/.ssh/id_rsa k8s/manifests.yaml ubuntu@${{ needs.terraform.outputs.server_ip }}:~/manifests.yaml
        ssh -i ~/.ssh/id_rsa ubuntu@${{ needs.terraform.outputs.server_ip }} "kubectl apply -f ~/manifests.yaml && kubectl rollout restart deployment/cat-web-deployment"