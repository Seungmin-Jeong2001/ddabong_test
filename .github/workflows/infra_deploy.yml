name: Infrastructure and Deployment (Terraform, Ansible, K8s)

on:
  workflow_dispatch:

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    env:
      GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
      TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_ssh_pub_key: ${{ secrets.SSH_PUB_KEY }}
      TF_VAR_ssh_user: "ubuntu"
    outputs:
      server_ip: ${{ steps.terraform_output.outputs.server_ip }}
      tunnel_token: ${{ steps.terraform_output.outputs.tunnel_token }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Notify Terraform Start
      run: |
        curl -X POST -H "Content-Type: application/json" -d '{"content": "🚀 **[Terraform]** GCP 인스턴스 생성을 시작합니다..."}' ${{ secrets.ACTION_WEBOOK_URL }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init
      working-directory: terraform

    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: terraform

    - name: Get Terraform Outputs
      id: terraform_output
      run: |
        cd terraform
        echo "server_ip=$(terraform output -raw server_ip)" >> $GITHUB_OUTPUT
        echo "tunnel_token=$(terraform output -raw tunnel_token)" >> $GITHUB_OUTPUT

    - name: Notify Terraform Success
      run: |
        curl -X POST -H "Content-Type: application/json" -d '{"content": "✅ **[Terraform]** 인스턴스 생성 완료! IP: `${{ steps.terraform_output.outputs.server_ip }}`"}' ${{ secrets.ACTION_WEBOOK_URL }}

  ansible-setup:
    name: Ansible Setup k3s & Monitoring
    needs: terraform
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Notify Ansible Start
      run: |
        curl -X POST -H "Content-Type: application/json" -d '{"content": "🛠️ **[Ansible]** 서버 환경 설정(K3s, Tunnel, Monitoring)을 시작합니다..."}' ${{ secrets.ACTION_WEBOOK_URL }}

    - name: Set up SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        echo "Waiting for SSH to be ready on ${{ needs.terraform.outputs.server_ip }}..."
        for i in {1..10}; do
          ssh-keyscan -H ${{ needs.terraform.outputs.server_ip }} >> ~/.ssh/known_hosts && break || (echo "Retrying in 10 seconds..." && sleep 10)
        done

    - name: Run Ansible Playbook
      run: |
        ansible-playbook -i "${{ needs.terraform.outputs.server_ip }}," ansible/playbook.yml \
          -u ubuntu \
          --private-key ~/.ssh/id_rsa \
          --extra-vars "tunnel_token=${{ needs.terraform.outputs.tunnel_token }} discord_webhook_url=${{ secrets.DISCORD_WEBHOOK_URL }}"

    - name: Notify Ansible Success
      run: |
        curl -X POST -H "Content-Type: application/json" -d '{"content": "✅ **[Ansible]** 서버 환경 설정 및 모니터링 배포 완료!"}' ${{ secrets.ACTION_WEBOOK_URL }}


  k8s-deploy:
    name: Final Rollout
    needs: [terraform, ansible-setup]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Notify Rollout Start
      run: |
        curl -X POST -H "Content-Type: application/json" -d '{"content": "🔄 **[K8s]** 서비스 재시작(Rollout)을 진행합니다..."}' ${{ secrets.ACTION_WEBOOK_URL }}

    - name: Set up SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ needs.terraform.outputs.server_ip }} >> ~/.ssh/known_hosts

    - name: App Rollout Restart
      run: |
        # KUBECONFIG 경로를 명시적으로 지정하여 권한 에러 방지
        ssh -i ~/.ssh/id_rsa ubuntu@${{ needs.terraform.outputs.server_ip }} \
          "KUBECONFIG=~/.kube/config kubectl rollout restart deployment/cat-web-deployment"

    - name: Notify All Success
      run: |
        curl -X POST -H "Content-Type: application/json" -d '{"content": "🎉 **[Finish]** 모든 배포 공정이 성공적으로 마무리되었습니다! \n🔗 접속 주소: `https://bucheongoyangijanggun.com`"}' ${{ secrets.ACTION_WEBOOK_URL }}

    - name: Notify Failure
      if: failure()
      run: |
        curl -X POST -H "Content-Type: application/json" -d '{"content": "❌ **[Error]** 배포 과정 중 오류가 발생했습니다. Actions 로그를 확인하세요."}' ${{ secrets.ACTION_WEBOOK_URL }}