---
- name: Setup k3s and Cloudflare Tunnel on Bucheong Cat Server
  hosts: all
  become: yes
  vars:
    cloudflared_version: "latest"
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Ensure host Nginx is stopped and disabled
      service:
        name: nginx
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Remove host Nginx to avoid conflicts
      apt:
        name: nginx
        state: absent
        purge: yes

    - name: Install dependencies
      apt:
        name:
          - curl
          - ca-certificates
          - gnupg
        state: present

    # K3s Installation
    - name: Check if k3s is installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_bin

    - name: Install k3s
      shell: curl -sfL https://get.k3s.io | sh -
      when: not k3s_bin.stat.exists

    - name: Wait for k3s to be ready
      wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        state: present

    - name: Ensure /etc/rancher/k3s/k3s.yaml is readable
      file:
        path: /etc/rancher/k3s/k3s.yaml
        mode: '0644'

    - name: Setup kubeconfig for user
      file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        mode: '0755'

    - name: Copy kubeconfig
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: yes
        owner: "{{ ansible_user }}"
        mode: '0600'

    - name: Update kubeconfig server address
      replace:
        path: "/home/{{ ansible_user }}/.kube/config"
        regexp: '127.0.0.1'
        replace: 'localhost'

    # Cloudflare Tunnel Installation
    - name: Download cloudflared deb package
      get_url:
        url: "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb"
        dest: "/tmp/cloudflared.deb"

    - name: Install cloudflared
      apt:
        deb: "/tmp/cloudflared.deb"

    - name: Create cloudflared systemd service
      copy:
        dest: /etc/systemd/system/cloudflared.service
        content: |
          [Unit]
          Description=Cloudflare Tunnel
          After=network.target

          [Service]
          Type=simple
          User=root
          ExecStart=/usr/local/bin/cloudflared tunnel run --token {{ tunnel_token }}
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Start cloudflared service
      systemd:
        name: cloudflared
        state: restarted
        enabled: yes
        daemon_reload: yes
