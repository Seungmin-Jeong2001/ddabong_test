---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600 # 1시간 이내에 업데이트했다면 스킵 (속도 향상)

- name: Ensure port 80 is free (Remove Nginx if exists)
  apt:
    name: nginx
    state: absent
    purge: yes
  # 서비스 중지 단계를 따로 두지 않아도, 
  # apt: state: absent를 쓰면 패키지가 없을 때 에러 없이 "ok"로 넘어갑니다.

- name: Install core dependencies
  apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - python3-pip
      - python3-kubernetes
      - software-properties-common
    state: present

- name: Ensure Python 3 is the default
  alternatives:
    name: python
    link: /usr/bin/python
    path: /usr/bin/python3